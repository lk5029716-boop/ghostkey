pluginManagement {
    def flutterSdkPath = {
        // Try local.properties first
        def properties = new Properties()
        def propsFile = file("local.properties")
        if (propsFile.exists()) {
            propsFile.withInputStream { properties.load(it) }
            def sdk = properties.getProperty("flutter.sdk")
            if (sdk != null && sdk.trim()) return sdk.trim()
        }
        // Fall back to FLUTTER_ROOT env var
        def envRoot = System.getenv("FLUTTER_ROOT")
        if (envRoot != null && envRoot.trim()) return envRoot.trim()
        // Fall back to flutter command
        def proc = "flutter --version -v".execute()
        proc.waitFor()
        def output = proc.in.text
        def m = output =~ /Flutter\s+.*\s+at\s+(.+)/
        if (m) return m[0][1].trim()
        assert false, "Could not determine Flutter SDK path"
        return null
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.6.1" apply false
    id "org.jetbrains.kotlin.android" version "1.9.10" apply false
}

include ":app"
