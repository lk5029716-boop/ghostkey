include: package:flutter_lints/flutter.yaml
analyzer:
  errors:
    # We guard with `if (!context.mounted) return;` everywhere
    use_build_context_synchronously: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
linter:
  rules:
    prefer_const_constructors: true
    always_declare_return_types: true
