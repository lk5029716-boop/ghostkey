name: Build GhostKey APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Generate Android project
        run: |
          mkdir -p /tmp/flutter_gen
          cd /tmp/flutter_gen
          flutter create --org com.ghostkey --project-name ghostkey --platforms android temp_app
          rm -rf /home/runner/work/ghostkey/ghostkey/android
          cp -r /tmp/flutter_gen/temp_app/android /home/runner/work/ghostkey/ghostkey/android
          cd /home/runner/work/ghostkey/ghostkey

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-creds.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/firebase-creds.json
          firebase appdistribution:distribute /home/runner/work/ghostkey/ghostkey/build/app/outputs/flutter-apk/app-debug.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --project ghostkey-2d586 \
            --groups testers
