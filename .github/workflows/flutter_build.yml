name: Build GhostKey APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Generate Android project
        run: |
          mkdir -p /tmp/flutter_gen
          cd /tmp/flutter_gen
          flutter create --org com.ghostkey --project-name ghostkey --platforms android temp_app
          rm -rf /home/runner/work/ghostkey/ghostkey/android
          cp -r /tmp/flutter_gen/temp_app/android /home/runner/work/ghostkey/ghostkey/android
          cd /home/runner/work/ghostkey/ghostkey

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze || true

      - name: Build APK
        run: flutter build apk --debug 2>&1 | tail -50

      - name: Find and verify APK
        run: |
          find /home/runner/work/ghostkey/ghostkey -name "*.apk" -type f 2>/dev/null
          APK=$(find /home/runner/work/ghostkey/ghostkey -name "app-debug.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi
          echo "APK found: $APK"
          ls -la "$APK"
          # Copy to expected location for upload
          mkdir -p /home/runner/work/ghostkey/ghostkey/build/app/outputs/flutter-apk/
          cp "$APK" /home/runner/work/ghostkey/ghostkey/build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
