name: Build GhostKey APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Generate Android project
        run: |
          # Generate a fresh Flutter project in a temp directory
          mkdir -p /tmp/flutter_gen
          cd /tmp/flutter_gen
          flutter create --org com.ghostkey --project-name ghostkey --platforms android temp_app
          # Copy generated android project back
          rm -rf /home/runner/work/ghostkey/ghostkey/android
          cp -r /tmp/flutter_gen/temp_app/android /home/runner/work/ghostkey/ghostkey/android
          # Go back to repo
          cd /home/runner/work/ghostkey/ghostkey

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze || true

      - name: Build APK
        run: flutter build apk --debug 2>&1 | tail -50

      - name: Verify APK
        run: ls -la build/app/outputs/flutter-apk/app-debug.apk

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: ignore
