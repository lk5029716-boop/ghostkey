name: Build & Distribute GhostKey APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: stable

      - run: flutter pub get
      - run: flutter analyze || true
      - run: flutter build apk --debug

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v2
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsJson: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          filePath: build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: "GhostKey build from main (${{ github.sha }})"

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk